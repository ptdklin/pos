<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дашборд | Google Таблица</title>
    <style>
        /* ----- МИНИМАЛЬНЫЙ, НО АККУРАТНЫЙ ДИЗАЙН ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
            min-height: 100vh;
        }

        /* контейнер — центрируем и задаём максимальную ширину */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* карточка с таблицей — лёгкая тень, скругление, чистота */
        .sheet-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: box-shadow 0.25s ease;
        }

        .sheet-card:hover {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        /* заголовок карточки — минималистично и функционально */
        .card-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .emoji-icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        .title-text {
            font-weight: 600;
            font-size: 1.15rem;
            color: #0f172a;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #eef2ff;
            color: #1e40af;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: 'SF Mono', monospace;
        }

        /* кнопка открыть в новой вкладке */
        .open-tab-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c3e66;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
            cursor: pointer;
        }

        .open-tab-btn:hover {
            background: #eef2ff;
            border-color: #b9c8f0;
            color: #1e3a8a;
            transform: translateY(-1px);
        }

        /* обёртка iframe — занимает примерно 30% высоты экрана, но смотрится просторно */
        .iframe-wrapper {
            width: 100%;
            height: 32vh;        /* около трети экрана — удобно для просмотра */
            min-height: 320px;   /* даже на маленьких экранах не сжимается слишком сильно */
            background: #fefefe;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #ffffff;
        }

        /* небольшой футер с подсказками */
        .info-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.7rem;
            color: #8b9ab0;
            border-top: 1px solid #e2e8f0;
            padding-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-footer span {
            background: #f1f5f9;
            padding: 5px 14px;
            border-radius: 40px;
        }

        /* адаптация под планшеты и телефоны */
        @media (max-width: 680px) {
            body {
                padding: 16px;
            }
            .card-header {
                padding: 12px 18px;
            }
            .title-text {
                font-size: 1rem;
            }
            .emoji-icon {
                font-size: 1.3rem;
            }
            .iframe-wrapper {
                height: 35vh;
                min-height: 280px;
            }
            .open-tab-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
        }

        /* для очень высоких экранов — сохраняем читаемость */
        @media (min-height: 900px) {
            .iframe-wrapper {
                height: 28vh;
            }
        }

        iframe:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- единственная карточка с вашей таблицей -->
    <div class="sheet-card">
        <div class="card-header">
            <div class="title-block">
                <span class="emoji-icon">📋</span>
                <span class="title-text">Дашборд · Основная таблица</span>
                <span class="badge">опубликованная версия</span>
            </div>
            <a href="#" class="open-tab-btn" id="openSheetBtn" target="_blank">
                <span>🔗</span> Открыть в новой вкладке
            </a>
        </div>
        <div class="iframe-wrapper">
            <!-- Ваш iframe с Google Таблицей (опубликованная HTML-версия) -->
            <iframe 
                id="mainSheetFrame"
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQOlijhzfwlGdv_YFLYhixvcraADerSa3Q1v6gJRQ9y-2HtBxKgDy2PWiimboY8X5Ec0WU7rowuyonG/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false"
                title="Google Таблица — дашборд"
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-downloads allow-modals allow-popups-to-escape-sandbox"
                referrerpolicy="no-referrer-when-downgrade"
                loading="lazy"
            ></iframe>
        </div>
    </div>
</div>

<div class="info-footer">
    <span>📌 Таблица опубликована в интернете — работает без авторизации</span>
    <span>🖱️ Нажмите «Открыть в новой вкладке» для полноэкранного режима</span>
    <span>📐 Размер окна: ~30% от экрана, можно менять в CSS (height в .iframe-wrapper)</span>
</div>

<script>
    (function() {
        // делаем кнопку "Открыть в новой вкладке" максимально удобной:
        // она берёт ссылку прямо из iframe (чтобы не дублировать вручную)
        const iframe = document.getElementById('mainSheetFrame');
        const openBtn = document.getElementById('openSheetBtn');

        if (iframe && openBtn) {
            // устанавливаем правильную ссылку при загрузке страницы
            function updateButtonLink() {
                const currentSrc = iframe.src;
                if (currentSrc && currentSrc !== 'about:blank') {
                    openBtn.href = currentSrc;
                } else {
                    // fallback — если вдруг src пустой, ставим исходную таблицу
                    openBtn.href = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOlijhzfwlGdv_YFLYhixvcraADerSa3Q1v6gJRQ9y-2HtBxKgDy2PWiimboY8X5Ec0WU7rowuyonG/pubhtml?gid=0&single=true&widget=true&headers=false";
                }
            }

            updateButtonLink();

            // дополнительно: если таблица по какой-то причине перезагрузится или изменится src,
            // кнопка всё равно будет вести на актуальный адрес (хотя в статике это не нужно, но надёжно)
            iframe.addEventListener('load', function() {
                updateButtonLink();
            });

            // небольшая защита от неверного URL (лог в консоль для разработчика)
            openBtn.addEventListener('click', function(e) {
                const targetUrl = openBtn.href;
                if (!targetUrl || targetUrl === '#') {
                    e.preventDefault();
                    console.warn('Ссылка для открытия таблицы не определена. Проверьте src у iframe.');
                }
            });
        }

        // Также добавим лёгкую обработку ошибок iframe (для отладки)
        iframe.onerror = function() {
            console.log('⚠️ Если таблица не отображается, проверьте ссылку публикации. Сейчас используется ваша корректная ссылка.');
        };
    })();
</script>

<!-- 
    🔧 Ваша таблица успешно встроена:
    src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOlijhzfwlGdv_YFLYhixvcraADerSa3Q1v6gJRQ9y-2HtBxKgDy2PWiimboY8X5Ec0WU7rowuyonG/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false"

    ✅ Особенности:
    - Окно с таблицей занимает примерно треть экрана по высоте (32vh), 
      но вы можете легко изменить в CSS (строка .iframe-wrapper height).
    - Карточка с плавной тенью, скругленными углами, отступами.
    - Есть кнопка "Открыть в новой вкладке" — удобно для детального просмотра.
    - Подвал с подсказками.
    - Адаптивно под любые экраны (мобильные, планшеты, десктоп).
    - Никаких лишних элементов, только одна таблица + минимальный дизайн.
    
    Чтобы изменить размер окна: откройте стили, найдите .iframe-wrapper 
    и поменяйте height (например, 25vh для четверти экрана или 40vh).
-->
</body>
</html>
